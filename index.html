<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>UC Centered Checkout</title>

  <!-- SDK -->
  <script src="https://apitest.cybersource.com/uc/v1/assets/1.0.0/UnifiedCheckout.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    .wrapper {
      max-width: 700px;
      margin: 0 auto;
      margin-top: 40px;
    }

    textarea {
      width: 100%;
      height: 150px;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    /* ✅ Центровка checkout */
    #payment-selection,
    #payment-screen {
      width: 400px;
      margin: 20px auto;
    }

    /* просто визуал */
    #payment-screen {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

  </style>
</head>

<body>

<div class="wrapper">

  <h2>Оплата (Unified Checkout)</h2>

  <!-- поле JWT -->
  <textarea 
    id="jwt-input" 
    placeholder="Вставь sessionJWT сюда..."
  ></textarea>

  <br>

  <button onclick="initPayment()">Init Payment</button>
  <button onclick="clearAll()">Очистить</button>

  <!-- ✅ кнопка -->
  <div id="payment-selection"></div>

  <!-- ✅ форма -->
  <div id="payment-screen"></div>

</div>

<script>

let currentCheckout = null;
let currentClient = null;

async function initPayment() {
  try {

    const sessionJWT = document.getElementById('jwt-input').value.trim();

    if (!sessionJWT) {
      alert("Вставь sessionJWT!");
      return;
    }

    // очистка
    clearCheckout();

    // ✅ создаём клиент
    currentClient = await VAS.UnifiedCheckout(sessionJWT);

    // ✅ создаём checkout
    currentCheckout = await currentClient.createCheckout({
      autoProcessing: true
    });

    // ✅ ВАЖНО: embedded mode (НЕ sidebar)
    const result = await currentCheckout.mount({
      paymentSelection: '#payment-selection',
      paymentScreen: '#payment-screen'
    });

    console.log("Payment result:", result);

  } catch (err) {
    console.error("Ошибка:", err);
    alert("Ошибка: смотри console");
  }
}

function clearCheckout() {
  document.getElementById('payment-selection').innerHTML = "";
  document.getElementById('payment-screen').innerHTML = "";

  if (currentCheckout) {
    currentCheckout.destroy();
    currentCheckout = null;
  }

  if (currentClient) {
    currentClient.destroy();
    currentClient = null;
  }
}

function clearAll() {
  document.getElementById('jwt-input').value = "";
  clearCheckout();
}

</script>

</body>
</html>
