<!DOCTYPE html>
<html<head><html lang="ru">
  <meta charset="UTF-8" />
  <title>UC Auto Processing</title>

  <script src="https://apitest.cybersource.com/uc/v1/assets/1.0.0/UnifiedCheckout.js"></script>
</head>
<body>

<h2>Оплата (Unified Checkout)</h2>

<!-- JWT -->
<div>
  <textarea 
    id="jwt-input" 
    placeholder="Вставь sessionJWT сюда..."
    style="width: 600px; height: 150px;"
  ></textarea>
</div>

<br>

<button onclick="initPayment()">Init Payment</button>
<button onclick="clearAll()">Очистить</button>

<hr>

<div id="payment-container"></div>

<hr>

<!-- ✅ результат -->
<h3>Ответ платежа</h3>
<pre id="result-container" style="background:#f5f5f5; padding:15px; width:800px; overflow:auto;"></pre>

<script>

async function initPayment() {
  try {
    const sessionJWT = document.getElementById('jwt-input').value.trim();

    if (!sessionJWT) {
      alert("Вставь sessionJWT!");
      return;
    }

    document.getElementById('payment-container').innerHTML = "";
    document.getElementById('result-container').textContent = "";

    const client = await VAS.UnifiedCheckout(sessionJWT);

    const checkout = await client.createCheckout({
      autoProcessing: true
    });

    // ✅ ЛОВИМ РЕЗУЛЬТАТ
    checkout.on('paymentComplete', (data) => {
      console.log("Payment result:", data);

      // красивый вывод JSON
      document.getElementById('result-container').textContent =
        JSON.stringify(data, null, 2);
    });

    // ✅ ЛОВИМ ОШИБКИ
    checkout.on('error', (err) => {
      console.error("Payment error:", err);

      document.getElementById('result-container').textContent =
        "ERROR:\n" + JSON.stringify(err, null, 2);
    });

    await checkout.mount('#payment-container');

    console.log("Checkout initialized");

  } catch (err) {
    console.error("Ошибка:", err);
    alert("Ошибка: смотри console");
  }
}

function clearAll() {
  document.getElementById('jwt-input').value = "";
  document.getElementById('payment-container').innerHTML = "";
  document.getElementById('result-container').textContent = "";
  console.log("Cleared");
}

</script>

</body>
</html>
