<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Unified Checkout</title>
  <script src="https://apitest.cybersource.com/uc/v1/assets/1.0.0/UnifiedCheckout.js"></script>
</head>

<body>

<h2>Test Unified Checkout</h2>

<textarea id="jwtInput" rows="6" cols="80" placeholder="Вставь sessionJWT"></textarea>
<br><br>

<button onclick="start()">Load Checkout</button>

<hr>

<div id="payment-button"></div>
<div id="payment-result"></div>

<script>
async function start() {
  try {
    const sessionJWT = document.getElementById("jwtInput").value.trim();

    if (!sessionJWT) {
      alert("Вставь sessionJWT");
      return;
    }

    document.getElementById("payment-button").innerHTML = "";
    document.getElementById("payment-result").innerHTML = "";

    const client = await VAS.UnifiedCheckout(sessionJWT);
    const checkout = await client.createCheckout();

    const result = await checkout.mount('#payment-button');

    console.log("RAW JWT:", result);

    const payload = JSON.parse(atob(result.split('.')[1]));

    console.log("DECODED:", payload);

    const resultDiv = document.getElementById("payment-result");

    if (payload.status === "AUTHORIZED") {
      resultDiv.innerHTML = `
        <h3 style="color:green;">✅ Платёж прошёл</h3>
        ID: ${payload.id}
      `;
    } else {
      resultDiv.innerHTML = `
        <h3 style="color:red;">❌ Ошибка</h3>
        Status: ${payload.status}<br>
        Reason: ${payload.details?.reason || 'Unknown'}
      `;
    }

  } catch (e) {
    console.error("ERROR:", e);
  }
}
</script>

</body>
</html>
