<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>UC Auto Processing</title>

  <!-- SDK -->
  <script src="https://apitest.cybersource.com/uc/v1/assets/1.0.0/UnifiedCheckout.js"></script>
</head>
<body>

<h2>Оплата (Unified Checkout)</h2>

<!-- сюда рендерится кнопка -->
<div id="payment-container"></div>

<script>
const sessionJWT = "ВСТАВЬ_СВОЙ_SESSION_JWT_СЮДА";

async function initPayment() {
  try {
    // ✅ создаём клиент
    const client = await VAS.UnifiedCheckout(sessionJWT);

    // ✅ ВАЖНО: включаем autoProcessing
    const checkout = await client.createCheckout({
      autoProcessing: true
    });

    // ✅ рендерим UI (кнопка + форма карты)
    await checkout.mount('#payment-container');

    console.log("Checkout initialized");

    // 👉 дальше UC всё делает сам:
    // - собирает карту
    // - создаёт payment
    // - запускает 3DS
    // - делает redirect если нужно

  } catch (err) {
    console.error("Ошибка:", err);
  }
}

initPayment();
</script>

</body>
</html>
